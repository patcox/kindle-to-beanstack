<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, sans-serif; width: 260px; padding: 10px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      h2 { font-size: 12px; color: #555; margin: 12px 0 4px; }
      ul { margin: 0; padding-left: 18px; }
      .empty { color: #888; }
    </style>
  </head>
  <body>
    <h1>Kindle → Beanstack</h1>

    <h2>Kids detected</h2>
    <div id="kids"></div>

    <h2>Reading data pulled</h2>
    <div id="dataset-summary"></div>

    <p style="color:#888; margin-top:14px;">
      Run "Detect kids" and "Pull reading data" from the panel on your Amazon
      Parent Dashboard page. Review &amp; log on your library's Beanstack site.
    </p>

    <button id="view-summary-btn">View reading summary</button>

    <script type="module" src="setup.js"></script>
  </body>
</html>
