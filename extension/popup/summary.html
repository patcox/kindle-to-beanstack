<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, sans-serif; width: 420px; max-height: 560px; overflow-y: auto; padding: 10px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      h2 { font-size: 12px; color: #555; border-bottom: 2px solid #ddd; padding-bottom: 2px; margin: 14px 0 6px; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 6px; }
      td, th { text-align: left; padding: 2px 4px; }
      th { color: #888; }
      .week-row td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
      .empty { color: #888; }
    </style>
  </head>
  <body>
    <h1>Reading Summary</h1>
    <div id="report"></div>
    <script type="module" src="summary.js"></script>
  </body>
</html>
